<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weighbridge Control Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#0F172A',
                        live: '#00E5FF',
                        action: '#FF8A00',
                        glass: 'rgba(30, 41, 59, 0.6)'
                    },
                    fontFamily: {
                        mono: ['Courier New', 'monospace'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Ambient Animated Grid Background */
        .bg-grid {
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }
        
        /* Smooth form input highlights */
        .input-line {
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* Custom scrollbar for a clean look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 229, 255, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="bg-brand text-slate-300 font-sans h-screen w-screen overflow-hidden flex relative selection:bg-live selection:text-brand">

    <div class="absolute inset-0 bg-grid pointer-events-none z-0"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-brand pointer-events-none z-0"></div>

    <aside class="w-20 my-6 ml-6 rounded-2xl bg-glass backdrop-blur-md border border-slate-700 flex flex-col items-center py-8 gap-8 z-10 shadow-lg">
        <div class="w-10 h-10 rounded shadow-[0_0_15px_#00E5FF] bg-live/20 border border-live flex items-center justify-center mb-8">
            <svg class="w-6 h-6 text-live" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        
        <div class="relative group cursor-pointer w-full flex justify-center border-l-2 border-action">
            <svg class="w-6 h-6 text-white group-hover:text-live transition-colors drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        </div>
        <div class="relative group cursor-pointer w-full flex justify-center border-l-2 border-transparent">
            <svg class="w-6 h-6 text-slate-500 group-hover:text-live transition-colors group-hover:drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <div class="relative group cursor-pointer w-full flex justify-center border-l-2 border-transparent">
            <svg class="w-6 h-6 text-slate-500 group-hover:text-live transition-colors group-hover:drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
        </div>
    </aside>

    <main class="flex-1 flex flex-col p-6 z-10 relative">
        
        <header class="h-16 rounded-xl bg-glass backdrop-blur-md border border-slate-700 px-6 flex items-center justify-between shadow-lg">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 border border-slate-600">
                    <span class="w-2.5 h-2.5 rounded-full bg-live animate-pulse shadow-[0_0_8px_#00E5FF]"></span>
                    <span class="text-xs font-semibold tracking-wider text-slate-300">SYSTEM CONNECTED</span>
                </div>
                <div class="px-3 py-1 text-xs border border-live/30 text-live rounded bg-live/10 uppercase tracking-widest">
                    Live Mode
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 text-slate-400">
                    <svg class="w-4 h-4 text-green-400" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                    <span class="text-xs font-medium">Signal: 98%</span>
                </div>
                <div class="text-sm font-mono text-white tracking-widest">
                    14:32:05 <span class="text-slate-500">GMT</span>
                </div>
            </div>
        </header>

        <div class="flex-1 flex gap-8 mt-6 overflow-hidden">
            
            <div class="flex-1 flex flex-col relative justify-center items-center">
                
                <div class="absolute top-0 w-full max-w-2xl px-12">
                    <div class="flex justify-between items-center relative">
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-0.5 bg-slate-700 -z-10"></div>
                        <div class="absolute left-0 top-1/2 -translate-y-1/2 w-1/2 h-0.5 bg-live shadow-[0_0_10px_#00E5FF] -z-10"></div>
                        
                        <div class="flex flex-col items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-live flex items-center justify-center shadow-[0_0_15px_#00E5FF]">
                                <svg class="w-3 h-3 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <span class="text-xs font-medium text-live">Capture Entree</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-action border-2 border-action flex items-center justify-center shadow-[0_0_15px_#FF8A00]">
                                <div class="w-2 h-2 bg-brand rounded-full"></div>
                            </div>
                            <span class="text-xs font-medium text-action">Complete Infos</span>
                        </div>
                        <div class="flex flex-col items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-brand border-2 border-slate-600 flex items-center justify-center"></div>
                            <span class="text-xs font-medium text-slate-500">Capture Sortie</span>
                        </div>
                    </div>
                </div>

                <div class="relative w-[450px] h-[450px] rounded-full flex items-center justify-center mt-12 group cursor-pointer">
                    <div class="absolute inset-0 rounded-full border border-live/20"></div>
                    <div class="absolute inset-4 rounded-full border border-live/40 animate-[spin_10s_linear_infinite] border-t-transparent border-b-transparent"></div>
                    <div class="absolute inset-8 rounded-full border-2 border-live shadow-[0_0_40px_rgba(0,229,255,0.3)] group-hover:shadow-[0_0_60px_rgba(0,229,255,0.5)] transition-shadow duration-500"></div>
                    
                    <div class="absolute inset-10 rounded-full bg-gradient-to-br from-slate-900 to-brand flex flex-col items-center justify-center shadow-inner">
                        <span class="text-slate-400 text-sm tracking-widest uppercase mb-2">Poids Actuel</span>
                        <div class="flex items-baseline gap-2">
                            <span class="font-mono text-7xl font-bold text-transparent bg-clip-text bg-gradient-to-b from-white to-live drop-shadow-[0_0_15px_rgba(0,229,255,0.8)] tracking-tighter">
                                42,580
                            </span>
                            <span class="text-2xl text-live font-light">kg</span>
                        </div>
                        <span class="text-xs text-green-400 mt-4 flex items-center gap-1 bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">
                            <div class="w-1.5 h-1.5 bg-green-400 rounded-full"></div> Stable
                        </span>
                    </div>
                </div>

            </div>

            <div class="w-[400px] flex flex-col h-full bg-glass backdrop-blur-xl border border-slate-700/50 rounded-2xl overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-slate-700/50 bg-slate-800/30">
                    <h2 class="text-xl font-light text-white tracking-wide">Détails de Pesée</h2>
                    <p class="text-xs text-slate-400 mt-1">Saisie des informations du camion</p>
                </div>

                <div class="flex-1 p-6 flex flex-col gap-8 overflow-y-auto">
                    <div class="flex flex-col gap-2">
                        <label class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Vehicule - Matricule</label>
                        <input type="text" placeholder="Ex: 1234-A-56" class="input-line w-full bg-transparent border-b border-live/50 py-2 text-xl text-white focus:outline-none focus:border-action placeholder-slate-600 font-mono uppercase">
                    </div>

                    <div class="flex flex-col gap-2 relative">
                        <label class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Client</label>
                        <select class="input-line w-full bg-transparent border-b border-live/50 py-2 text-white focus:outline-none focus:border-action appearance-none cursor-pointer">
                            <option class="bg-brand">Sélectionner un client...</option>
                            <option class="bg-brand">Industries Logistiques SA</option>
                            <option class="bg-brand">BTP Construction SARL</option>
                        </select>
                        <div class="absolute right-0 bottom-3 pointer-events-none">
                            <svg class="w-4 h-4 text-live" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 relative">
                        <label class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Product Family</label>
                        <select class="input-line w-full bg-transparent border-b border-live/50 py-2 text-white focus:outline-none focus:border-action appearance-none cursor-pointer">
                            <option class="bg-brand">Matériaux de construction</option>
                            <option class="bg-brand">Céréales</option>
                        </select>
                        <div class="absolute right-0 bottom-3 pointer-events-none">
                            <svg class="w-4 h-4 text-live" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>

                    <div class="flex flex-col gap-2 relative">
                        <label class="text-xs font-semibold tracking-wider text-slate-400 uppercase">Product</label>
                        <select class="input-line w-full bg-transparent border-b border-live/50 py-2 text-white focus:outline-none focus:border-action appearance-none cursor-pointer">
                            <option class="bg-brand">Ciment Vrac</option>
                            <option class="bg-brand">Gravier 15/25</option>
                            <option class="bg-brand">Sable Fin</option>
                        </select>
                        <div class="absolute right-0 bottom-3 pointer-events-none">
                            <svg class="w-4 h-4 text-live" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-slate-800/50 flex flex-col gap-4 border-t border-slate-700/50">
                    <button class="w-full bg-action text-brand font-bold py-4 rounded tracking-wide shadow-[0_0_15px_rgba(255,138,0,0.3)] hover:shadow-[0_0_25px_rgba(255,138,0,0.6)] transition-all duration-300 hover:scale-[1.02] flex items-center justify-center gap-2">
                        Enregistrer Entrée
                        <kbd class="hidden lg:inline-block px-2 py-0.5 text-[10px] border border-brand/30 rounded bg-brand/10 ml-2">↵</kbd>
                    </button>
                    <button class="w-full border border-live text-live font-medium py-3 rounded tracking-wide hover:shadow-[0_0_15px_rgba(0,229,255,0.3)] hover:bg-live/5 transition-all duration-300 flex items-center justify-center gap-2">
                        Saisie Manuelle
                        <kbd class="hidden lg:inline-block px-2 py-0.5 text-[10px] border border-live/50 rounded bg-live/10 ml-2">F4</kbd>
                    </button>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
