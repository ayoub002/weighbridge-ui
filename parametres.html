<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mizano - Paramètres</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'], },
                    colors: {
                        brand: { orange: '#DD4B25', dark: '#121212', darker: '#0A0A0A', text: '#FFFFFF', textMuted: '#9CA3AF', }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.3)',
                        'glow-orange': '0 0 25px -5px rgba(221, 75, 37, 0.6)',
                    },
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-panel-dark { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(221, 75, 37, 0.8); }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gray-900 via-brand-dark to-black min-h-screen text-brand-text font-sans overflow-hidden relative">

    <div class="fixed top-[-20%] right-[0%] w-[600px] h-[600px] bg-brand-orange/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-900/20 rounded-full blur-[100px] pointer-events-none z-0"></div>

    <div class="flex h-screen relative z-10">

        <aside class="w-[260px] glass-panel-dark border-r border-white/5 flex flex-col h-full flex-shrink-0 relative z-20">
            <div class="h-24 flex items-center px-8">
                <img src="https://github.com/ayoub002/weighbridge-ui/blob/main/MizanoLOGO%20LANDINGPAGE.png?raw=true" alt="Mizano Logo" class="h-8 object-contain">
            </div>

            <nav class="flex-1 px-4 py-6 space-y-3">
                <a href="index.html" class="flex items-center gap-4 px-5 py-3.5 text-brand-textMuted hover:bg-white/5 hover:text-white rounded-xl font-semibold transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                    <span class="text-[15px]">Bascule</span>
                </a>
                
                <a href="parametres.html" class="flex items-center gap-4 px-5 py-3.5 bg-brand-orange/80 backdrop-blur-md border border-white/20 shadow-glow-orange text-white rounded-xl font-bold transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span class="text-[15px]">Paramètres</span>
                </a>

                <a href="historique.html" class="flex items-center gap-4 px-5 py-3.5 text-brand-textMuted hover:bg-white/5 hover:text-white rounded-xl font-semibold transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span class="text-[15px]">Historique</span>
                </a>
            </nav>

            <div class="p-6 mt-auto">
                <button class="w-full flex items-center justify-center gap-2 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl font-bold transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Se déconnecter
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col relative overflow-hidden">
            
            <header class="h-24 flex items-center justify-between px-8 z-10 flex-shrink-0">
                <div>
                    <h1 class="text-3xl font-extrabold text-white tracking-tight">Configuration Système</h1>
                    <p class="text-brand-textMuted font-medium text-sm mt-1">Gestion des paramètres de l'application</p>
                </div>
                
                <div class="flex items-center gap-4">
                    <a href="parametres-light.html" class="glass-panel p-2 rounded-full text-brand-textMuted hover:text-white hover:bg-white/10 transition-all cursor-pointer shadow-sm group" title="Passer au mode clair">
                        <svg class="w-5 h-5 group-hover:rotate-45 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </a>
                    
                    <div class="glass-panel p-1.5 pr-4 rounded-full flex items-center gap-3 cursor-pointer hover:bg-white/10 transition-all">
                        <img src="https://ui-avatars.com/api/?name=S+Ayoub&background=DD4B25&color=FFFFFF&bold=true" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-brand-orange/50">
                        <div class="text-right">
                            <p class="text-sm font-bold text-white leading-tight">S. Ayoub</p>
                            <p class="text-xs font-semibold text-brand-textMuted">Opérateur</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-hidden px-8 pb-8 flex flex-col z-10 gap-6">
                
                <div class="flex items-center gap-2 overflow-x-auto pb-2 custom-scrollbar flex-shrink-0">
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all bg-brand-orange shadow-glow-orange text-white">
                        PARAMÈTRE BASCULE
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        PRODUITS
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        CLIENTS
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        LOCAL / TRANSPORT DE CAMPAGNE
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        CHAMPS OBLIGATOIRE / AFFICHER
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        TICKET
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        USERS STATISTIQUE
                    </button>
                    <button class="px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all glass-panel-dark text-brand-textMuted hover:text-white hover:bg-white/5">
                        EXPORT DATABASE
                    </button>
                </div>

                <div class="glass-panel rounded-[2rem] flex-1 overflow-y-auto custom-scrollbar p-8">
                    
                    <div class="flex items-center justify-between mb-10 pb-6 border-b border-white/10">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 glass-panel bg-white/5 rounded-xl flex items-center justify-center text-brand-textMuted">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                            </div>
                            <h2 class="text-2xl font-extrabold text-white">Paramètre bascule</h2>
                        </div>
                        <button class="bg-brand-orange hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-xl text-sm shadow-glow-orange transition-all">
                            Enregistrer
                        </button>
                    </div>

                    <form class="max-w-4xl space-y-6">
                        
                        <div class="grid grid-cols-12 items-center gap-6">
                            <label class="col-span-12 md:col-span-4 text-sm font-bold text-brand-textMuted">
                                N° de Port
                            </label>
                            <div class="col-span-12 md:col-span-8">
                                <input type="text" class="w-full px-5 py-4 rounded-xl border border-white/10 glass-panel-dark focus:border-brand-orange/50 outline-none transition-all font-semibold text-white text-sm" placeholder="Saisir le port...">
                            </div>
                        </div>

                        <div class="grid grid-cols-12 items-center gap-6">
                            <label class="col-span-12 md:col-span-4 text-sm font-bold text-brand-textMuted">
                                N° bytes
                            </label>
                            <div class="col-span-12 md:col-span-8">
                                <input type="text" class="w-full px-5 py-4 rounded-xl border border-white/10 glass-panel-dark focus:border-brand-orange/50 outline-none transition-all font-semibold text-white text-sm" placeholder="Saisir les bytes...">
                            </div>
                        </div>

                        <div class="grid grid-cols-12 items-center gap-6">
                            <label class="col-span-12 md:col-span-4 text-sm font-bold text-brand-textMuted">
                                Indicator
                            </label>
                            <div class="col-span-12 md:col-span-8">
                                <input type="text" value="SENSOCAR" class="w-full px-5 py-4 rounded-xl border border-white/10 glass-panel-dark focus:border-brand-orange/50 outline-none transition-all font-semibold text-white text-sm">
                            </div>
                        </div>

                        <div class="grid grid-cols-12 items-center gap-6">
                            <label class="col-span-12 md:col-span-4 text-sm font-bold text-brand-textMuted">
                                Type de pesée
                            </label>
                            <div class="col-span-12 md:col-span-8 relative">
                                <select class="w-full px-5 py-4 rounded-xl border border-white/10 glass-panel-dark focus:border-brand-orange/50 outline-none transition-all font-semibold text-white text-sm appearance-none cursor-pointer">
                                    <option value="automatique" class="bg-[#121212] text-white py-2">Automatique</option>
                                    <option value="manuelle" class="bg-[#121212] text-white py-2">Manuelle</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center pr-5 pointer-events-none text-brand-textMuted">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>

                    </form>

                </div>
            </div>
        </main>
    </div>
</body>
</html>
